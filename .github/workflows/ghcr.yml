name: GHCR Images
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'apps/web/**'
      - 'packages/**'
      - '**/Dockerfile'
      - 'deployments/Caddyfile'
      - '.github/workflows/ghcr.yml'
  workflow_dispatch:
permissions: {contents: read, packages: write, id-token: write, attestations: write}
concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {image: api, dockerfile: apps/api/Dockerfile}
          - {image: worker, dockerfile: apps/worker/Dockerfile}
          - {image: web, dockerfile: apps/web/Dockerfile}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/open-graph-memory-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
