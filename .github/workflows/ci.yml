name: CI
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'deployments/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: {version: "0.11.31", enable-cache: true}
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
  web:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/web}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: apps/web/package-lock.json}
      - run: npm install --global npm@11.6.2
      - run: npm ci --no-audit --no-fund
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose -f deployments/docker-compose.yml config --quiet
      - run: GHCR_NAMESPACE=example IMAGE_TAG=test docker compose -f deployments/docker-compose.yml -f deployments/docker-compose.prod.yml config --quiet
      - run: GHCR_NAMESPACE=example IMAGE_TAG=test python scripts/validate-production-compose.py
      - run: docker compose -f deployments/docker-compose.yml -f deployments/docker-compose.external-s3.yml config --quiet
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/runtime-gate.sh
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/security-gate.sh
      - uses: astral-sh/setup-uv@v5
        with: {version: "0.11.31", enable-cache: true}
      - run: uv sync --frozen --group dev
      - run: uv export --frozen --all-groups --no-emit-project --format requirements-txt --output-file /tmp/requirements-audit.txt
      - run: uvx --from pip-audit==2.7.3 pip-audit --requirement /tmp/requirements-audit.txt
      # Pin immutable commit; v0.29.0 references removed setup-trivy@v0.2.2.
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with: {scan-type: fs, scan-ref: ., severity: "CRITICAL,HIGH", exit-code: "1", ignore-unfixed: true}
