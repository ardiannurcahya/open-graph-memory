name: opengraphmemory-redis

x-logging: &logging
  driver: json-file
  options: {max-size: "10m", max-file: "3"}

services:
  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    mem_limit: 384m
    pids_limit: 128
    command: [redis-server, --appendonly, "yes", --requirepass, "${REDIS_PASSWORD:?set REDIS_PASSWORD}", --maxmemory, 256mb, --maxmemory-policy, noeviction]
    ports: ["${REDIS_BIND_IP:?set REDIS_BIND_IP}:6379:6379"]
    volumes: [redis-data:/data]
    healthcheck:
      test: [CMD-SHELL, "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?set REDIS_PASSWORD}"
    logging: *logging

volumes:
  redis-data: {}
