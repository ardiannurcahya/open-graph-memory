name: opengraphmemory-neo4j

x-logging: &logging
  driver: json-file
  options: {max-size: "10m", max-file: "3"}

services:
  neo4j:
    image: neo4j:5.26.2-community
    restart: unless-stopped
    mem_limit: 1536m
    pids_limit: 512
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:?set NEO4J_AUTH}"
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "${NEO4J_BIND_IP:?set NEO4J_BIND_IP}:7474:7474"
      - "${NEO4J_BIND_IP:?set NEO4J_BIND_IP}:7687:7687"
    volumes: [neo4j-data:/data]
    healthcheck:
      test: [CMD-SHELL, "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging: *logging

volumes:
  neo4j-data: {}
