name: opengraphmemory
x-logging: &default-logging
  driver: json-file
  options: {max-size: "10m", max-file: "3"}
x-host-access: &host-access
  extra_hosts: ["host.docker.internal:host-gateway"]
services:
  redis:
    image: redis:7.4.2-alpine
    command: redis-server --appendonly yes
    restart: unless-stopped
    mem_limit: 96m
    healthcheck: {test: [CMD, redis-cli, ping], interval: 10s, timeout: 5s, retries: 5}
    logging: *default-logging
    volumes: [redis-data:/data]
  migrate:
    <<: *host-access
    image: "ghcr.io/${GHCR_NAMESPACE:-ardiannurcahya}/open-graph-memory-api:${IMAGE_TAG:-latest}"
    command: alembic upgrade head
    env_file: [{path: ../.env, required: false}]
    environment: {APP_ENV: production}
    depends_on: {redis: {condition: service_healthy}}
    restart: "no"
    logging: *default-logging
  api:
    <<: *host-access
    image: "ghcr.io/${GHCR_NAMESPACE:-ardiannurcahya}/open-graph-memory-api:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 256
    stop_grace_period: 30s
    env_file: [{path: ../.env, required: false}]
    environment: {APP_ENV: production}
    depends_on: {redis: {condition: service_healthy}, migrate: {condition: service_completed_successfully}}
    healthcheck: {test: [CMD, python, -c, "import urllib.request;urllib.request.urlopen('http://localhost:8000/ready')"], interval: 10s, timeout: 5s, retries: 8}
    logging: *default-logging
  worker:
    <<: *host-access
    image: "ghcr.io/${GHCR_NAMESPACE:-ardiannurcahya}/open-graph-memory-worker:${IMAGE_TAG:-latest}"
    command: [arq, app.arq_worker.WorkerSettings]
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 256
    stop_grace_period: 60s
    env_file: [{path: ../.env, required: false}]
    environment: {APP_ENV: production}
    depends_on: {redis: {condition: service_healthy}, migrate: {condition: service_completed_successfully}}
    healthcheck: {test: [CMD, arq, --check, app.arq_worker.WorkerSettings], interval: 15s, timeout: 10s, retries: 5}
    logging: *default-logging
  web:
    image: "ghcr.io/${GHCR_NAMESPACE:-ardiannurcahya}/open-graph-memory-web:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    mem_limit: 128m
    pids_limit: 128
    environment: {CADDY_SITE_ADDRESS: "${CADDY_SITE_ADDRESS:-:80}"}
    ports: ["${WEB_PORT:-3000}:80"]
    depends_on: {api: {condition: service_healthy}}
    healthcheck: {test: [CMD, wget, -q, -O, /dev/null, http://localhost/], interval: 15s, timeout: 5s, retries: 5}
    logging: *default-logging
volumes: {redis-data: {}}
