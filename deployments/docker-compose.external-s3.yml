services:
  rustfs:
    profiles: [local-storage]
  bucket-init:
    profiles: [local-storage]
  api:
    depends_on: !override
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      qdrant: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
  worker:
    depends_on: !override
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
